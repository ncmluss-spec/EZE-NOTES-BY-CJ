<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>School Homework | EZE NOTES BY CJ</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif}
body{background:#020617;color:#fff;overflow-x:hidden}
body:before{content:"";position:fixed;inset:-30%;background:
radial-gradient(circle,#8b5cf655 0,transparent 35%),
radial-gradient(circle at 80% 20%,#06b6d455 0,transparent 35%),
radial-gradient(circle at 20% 80%,#7c3aed55 0,transparent 35%);
animation:move 18s linear infinite alternate;filter:blur(40px);z-index:-2}
@keyframes move{to{transform:translate(8%,6%) rotate(10deg)}}
header{position:sticky;top:0;background:rgba(2,6,23,.7);backdrop-filter:blur(15px);padding:18px 6%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08)}
.logo{font-size:1.6rem;font-weight:800;background:linear-gradient(90deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
a{text-decoration:none;color:#fff}
.home{padding:10px 18px;border-radius:30px;background:#8b5cf6}
.container{max-width:1200px;margin:auto;padding:40px 20px}
.hero{text-align:center;padding:20px}
.hero h1{font-size:3rem}
.search{margin:25px auto;max-width:600px}
.search input{width:100%;padding:16px;border-radius:50px;border:none;background:#ffffff10;color:#fff}
.subject{margin:30px 0;background:#ffffff08;border:1px solid #ffffff12;border-radius:22px;padding:22px;backdrop-filter:blur(18px)}
.subject h2{margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.btn{display:block;padding:16px;border-radius:16px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);font-weight:700;text-align:center;transition:.3s}
.btn:hover{transform:translateY(-5px) scale(1.02)}
.badge{background:#ff1744;padding:4px 10px;border-radius:20px;font-size:.7rem;margin-left:8px}
footer{text-align:center;padding:30px;color:#94a3b8}

.new-project-btn{
    position:relative;
    background:linear-gradient(135deg,#ff6b35,#ff1744,#8b5cf6);
    background-size:300% 300%;
    animation:gradientMove 4s ease infinite;
    box-shadow:0 0 25px rgba(255,23,68,.45);
    border:2px solid rgba(255,255,255,.25);
}

.new-project-btn:hover{
    transform:translateY(-6px) scale(1.05);
    box-shadow:0 0 40px rgba(255,23,68,.8);
}

.new-badge{
    display:inline-block;
    margin-left:10px;
    padding:4px 10px;
    border-radius:30px;
    background:#ff1744;
    color:#fff;
    font-size:11px;
    font-weight:700;
    animation:newPulse 1.5s infinite;
}

@keyframes newPulse{
    0%,100%{
        transform:scale(1);
        box-shadow:0 0 5px #ff1744;
    }
    50%{
        transform:scale(1.15);
        box-shadow:0 0 18px #ff1744;
    }
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
 
.subject{
    transition:.5s;
    position:relative;
    overflow:hidden;
}

.subject::before{
    content:"";
    position:absolute;
    left:-120%;
    top:0;
    width:60%;
    height:100%;
    background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.15),
    transparent);
    transition:1s;
}

.subject:hover::before{
    left:160%;
}

.subject:hover{
    transform:translateY(-10px);
    box-shadow:0 20px 60px rgba(139,92,246,.4);
}

.btn{

background:linear-gradient(
135deg,
#8b5cf6,
#06b6d4,
#8b5cf6);

background-size:300%;

animation:buttonGradient 8s linear infinite;

}

@keyframes buttonGradient{

0%{
background-position:0%;
}

100%{
background-position:300%;
}

}
    
</style>
 
</head>
 
<body>
 
<header>
 
<div class="logo">EZE NOTES BY CJ</div>
<a class="home" href="index.html"><i class="fas fa-house"></i> Home</a>
</header>

<div class="container">
<div class="hero">
<h1>📚 School Homework <span class="badge">NEW</span></h1>

<div class="search"><input id="search" placeholder="Search homework..."></div>
</div>

<div class="subject">
<h2>📖 English</h2>
<div class="grid">

<a class="btn" href="YOUR_DRIVE_LINK">Letters</a>

</div>
</div>

<div class="subject">
<h2>🧪 Chemistry</h2>
<div class="grid">
<a class="btn" href="YOUR_DRIVE_LINK">Chapter 1</a>
<a class="btn" href="YOUR_DRIVE_LINK">Chapter 2</a>
<a class="btn" href="YOUR_DRIVE_LINK">Assignments</a>

<div class="subject">

<div class="grid">
<a class="btn" href="https://drive.google.com/file/d/1A8KOzpG0Mv1J1OFJrnr5VwQ7tnj5J9LK/view?usp=drivesdk">कारक</a>
<a class="btn" href="https://drive.google.com/file/d/1Q9GPVwCvCX5I8c75nZ-KC4Ij8L890bwC/view?usp=drivesdk">वाक्य विचार</a>
<a class="btn" href="YOUR_DRIVE_LINK">____</a>

</div>

    <i class="fas fa-laptop-code"></i>

</a>
<a class="btn" href="YOUR_DRIVE_LINK">Lab Work</a>
</div>
</div>

<footer>© 2026 EZE NOTES BY CJ</footer>
</div>

<script>
const s=document.getElementById('search');
s.onkeyup=()=>{
 let v=s.value.toLowerCase();
 document.querySelectorAll('.btn').forEach(b=>{
  b.style.display=b.textContent.toLowerCase().includes(v)?'block':'none';
 });
}
</script>
 <div id="particles"></div>
 <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
tsParticles.load("particles",{
    fullScreen:{
        enable:true,
        zIndex:-1
    },
    particles:{
        number:{
            value:80
        },
        color:{
            value:["#8b5cf6","#06b6d4","#ffffff"]
        },
        move:{
            enable:true,
            speed:1
        },
        size:{
            value:{min:1,max:4}
        },
        opacity:{
            value:.4
        },
        links:{
            enable:true,
            color:"#8b5cf6",
            opacity:.2
        }
    }
});
</script>
<script src="https://unpkg.com/scrollreveal"></script>

<script>
ScrollReveal().reveal(".subject",{
distance:"80px",
origin:"bottom",
duration:1200,
interval:150
});
</script>
    
    
</body>
</html>
